services:
  - type: web
    name: microgig-api
    runtime: node
    plan: free
    region: oregon
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    envVars:
    - key: RAZORPAY_KEY_ID
      sync: false
    - key: RAZORPAY_KEY_SECRET
      sync: false
    - key: MONGO_URI
      fromConfig: true
    - key: JWT_SECRET
      fromConfig: true
    - key: PORT
      value: 10000
